<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>doup96's Site</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      display: flex;
      font-family: 'Segoe UI', sans-serif;
      height: 100vh;
      overflow: hidden;
      flex-direction: row;
    }

    .sidebar {
      width: 250px;
      background-color: #1f1f1f;
      color: white;
      display: flex;
      flex-direction: column;
      padding: 20px;
      position: fixed;
      top: 0;
      left: 0;
      height: 100%;
    }

    .sidebar h2 {
      margin-bottom: 20px;
      font-size: 22px;
      color: #00bfff;
    }

    .nav-link {
      margin: 10px 0;
      text-decoration: none;
      color: #ddd;
      padding: 8px;
      border-radius: 6px;
      transition: 0.35s;
      display: block;
    }

    .nav-link:hover {
      background-color: #333;
      color: #00bfff;
    }

    /* Hover dropdown setup */
    .hover-dropdown {
      position: relative;
    }

    .hover-dropdown .dropdown-content {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.35s ease-in-out;
      margin-left: 10px;
    }

    .hover-dropdown:hover .dropdown-content {
      max-height: 200px;
    }

    .sub-link {
      font-size: 14px;
      color: #aaa;
      margin: 5px 0;
      text-decoration: none;
      transition: 0.2s;
    }

    .sub-link:hover {
      color: #00bfff;
    }

    /* Main content area */
    .main {
      margin-left: 250px;
      flex-grow: 1;
      padding: 30px;
      background-color: #f4f4f4;
      display: flex;
      flex-direction: column;
      align-items: center; /* Center the content */
      text-align: center;
    }

    .main-content {
      display: flex;
      flex-direction: column; /* Align the content vertically */
      align-items: center; /* Horizontally center the items */
    }

    .main-content h1 {
      font-size: 32px;
      margin-bottom: 20px; /* Space between heading and paragraph */
    }

    .main-content p {
      font-size: 18px;
      margin-top: 0;
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <h2>doup96</h2>
    <a href="#" class="nav-link">🏠 Home</a>

    <div class="hover-dropdown">
      <div class="nav-link">📁 Projects ▾</div>
      <div class="dropdown-content">
        <a href="https://doup960.github.io/GuildbarRevert.css" class="sub-link">GuildbarRevert</a>
        <a href="https://doup960.github.io/HideTitle.css" class="sub-link">Hide-Title</a>
        <a href="https://doup960.github.io/SmallProfiles.css" class="sub-link">SmallProfile</a>
      </div>
    </div>

    <a href="#" class="nav-link">📜 About Me</a>
    <a href="#" class="nav-link">📬 Contact</a>
    <a href="https://github.com/doup960" class="nav-link" target="_blank">💻 GitHub</a>
  </div>

  <div class="main">
    <!-- Home Page Content -->
    <div class="main-content">
      <h1>Welcome</h1>
      <p>Thanks for visiting my personal site! I'm working on various projects, including Discord bots, Roblox games, and more. Feel free to check out my work!</p>
    </div>
  </div>
</body>
</html>
