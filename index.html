<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>doup96's Site</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      display: flex;
      font-family: 'Segoe UI', sans-serif;
      height: 100vh;
      overflow: hidden;
    }

    .sidebar {
      width: 220px;
      background-color: #1f1f1f;
      color: white;
      display: flex;
      flex-direction: column;
      padding: 20px;
    }

    .sidebar h2 {
      margin-bottom: 20px;
      font-size: 22px;
      color: #00bfff;
    }

    .nav-link {
      margin: 10px 0;
      text-decoration: none;
      color: #ddd;
      padding: 8px;
      border-radius: 6px;
      transition: 0.2s;
      display: block;
    }

    .nav-link:hover {
      background-color: #333;
      color: #00bfff;
    }

    /* Hover dropdown setup */
    .hover-dropdown {
      position: relative;
    }

    .hover-dropdown .dropdown-content {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.5s ease-in-out; /* Smooth opening */
      margin-left: 10px;
    }

    .hover-dropdown:hover .dropdown-content {
      max-height: 200px; /* The height when expanded */
    }

    .sub-link {
      font-size: 14px;
      color: #aaa;
      margin: 5px 0;
      text-decoration: none;
      transition: 0.2s;
    }

    .sub-link:hover {
      color: #00bfff;
    }

    /* Main content area */
    .main {
      flex-grow: 1;
      padding: 30px;
      background-color: #f4f4f4;
      overflow-y: auto;
    }

    /* Make sidebar a bit bigger */
    .sidebar {
      width: 250px; /* Increased width */
    }

    .nav-link {
      font-size: 16px; /* Increased font size for better readability */
    }

    /* Center the content in the remaining space */
    .main {
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

  </style>
</head>
<body>
  <div class="sidebar">
    <h2>doup96</h2>
    <a href="#" class="nav-link">🏠 Home</a>

    <div class="hover-dropdown">
      <div class="nav-link">📁 Projects ▾</div>
      <div class="dropdown-content">
        <a href="https://doup960.github.io/GuildbarRevert.css" class="sub-link">GuildbarRevert</a>
        <a href="https://doup960.github.io/HideTitle.css" class="sub-link">Hide-Title</a>
        <a href="https://doup960.github.io/SmallProfiles.css" class="sub-link">SmallProfile</a>
      </div>
    </div>

    <a href="#" class="nav-link">📜 About Me</a>
    <a href="#" class="nav-link">📬 Contact</a>
    <a href="https://github.com/doup960" class="nav-link" target="_blank">💻 GitHub</a>
  </div>

  <div class="main">
    <h1>About Me</h1>
    <p>Hi, I'm doup96. This is my personal site for Roblox projects, Discord bots, and other fun stuff I'm working on.</p>
    <p>Stick around — more coming soon!</p>
  </div>
</body>
</html>
